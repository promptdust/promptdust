ShortDescription: Read-only map of where AI tools leave data on your machine.
Description: >-
  PromptDust maps where AI tools (Claude Code, Cursor, ChatGPT/Claude desktop, Copilot,
  Ollama, and more) store conversations, caches, and credentials on the local machine,
  and reports what amplifies that exposure — cloud sync, backups, git repos,
  world-readable permissions, unencrypted disk. It is a read-only, local-only footprint
  mapper: it reports metadata (existence, size, timestamps, counts), never conversation
  content, and never a "safe/unsafe" verdict. Not a scanner, cleaner, or DLP.
